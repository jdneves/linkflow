# Perfil de testes — usa H2 em memória
spring.datasource.url=jdbc:h2:mem:linkflow_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Desabilita Flyway nos testes (JPA cria as tabelas)
spring.flyway.enabled=false

# Redis desabilitado nos testes
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Mail configurado com host falso (bean criado, mas sem servidor real)
spring.mail.host=localhost
spring.mail.port=3025

linkflow.base-url=http://localhost:8080

# JWT
linkflow.jwt.secret=chave-secreta-para-testes-com-pelo-menos-32-chars-ok
linkflow.jwt.expiration=86400000
linkflow.jwt.refresh-expiration=604800000
