# ==========================
# AplicaĂ§ĂŁo
# ==========================
spring.application.name=linkflow
server.port=${SERVER_PORT:8080}

# ==========================
# Banco de dados (PostgreSQL)
# ==========================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/linkflow}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway (migraĂ§Ăµes do banco)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==========================
# Redis (cache)
# ==========================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ==========================
# JWT
# ==========================
linkflow.jwt.secret=${JWT_SECRET:3cfa76ef14937b7b13d4e8b30e96f8a4b5b32a4d8e9f4a3c2b1a0f8e7d6c5b4}
linkflow.jwt.expiration=86400000
linkflow.jwt.refresh-expiration=604800000

# ==========================
# E-mail
# ==========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================
# AplicaĂ§ĂŁo â€” URL base (usada para montar short links)
# ==========================
linkflow.base-url=${BASE_URL:http://localhost:8080}

# ==========================
# APIs externas
# ==========================
linkflow.claude.api-key=${ANTHROPIC_API_KEY:}
linkflow.claude.model=claude-sonnet-4-20250514
linkflow.claude.mock=${CLAUDE_MOCK:false}
linkflow.elevenlabs.api-key=${ELEVENLABS_API_KEY:}
linkflow.elevenlabs.default-voice-id=${ELEVENLABS_VOICE_ID:21m00Tcm4TlvDq8ikWAM}
linkflow.heygen.api-key=${HEYGEN_API_KEY:}
linkflow.heygen.default-avatar-id=${HEYGEN_AVATAR_ID:}

# Cloudflare R2
linkflow.storage.endpoint=${R2_ENDPOINT:}
linkflow.storage.access-key=${R2_ACCESS_KEY:}
linkflow.storage.secret-key=${R2_SECRET_KEY:}
linkflow.storage.bucket=${R2_BUCKET:linkflow-media}
linkflow.storage.public-url=${R2_PUBLIC_URL:}

# ==========================
# VĂ­deo FACELESS (ffmpeg)
# ==========================
faceless.width=${FACELESS_WIDTH:1080}
faceless.height=${FACELESS_HEIGHT:1920}
faceless.fps=${FACELESS_FPS:30}
faceless.font-path=${FACELESS_FONT_PATH:/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf}
faceless.font-name=${FACELESS_FONT_NAME:DejaVu Sans}
faceless.background=${FACELESS_BACKGROUND:gradient}
faceless.ffmpeg-path=${FACELESS_FFMPEG_PATH:ffmpeg}
faceless.ffprobe-path=${FACELESS_FFPROBE_PATH:ffprobe}
faceless.max-words-per-block=${FACELESS_MAX_WORDS:4}

# ==========================
# Actuator
# ==========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.mail.enabled=false
